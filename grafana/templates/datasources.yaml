---
apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 15s

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ironwall
    user: ironwall
    secureJsonData:
      password: ironwall
    jsonData:
      sslmode: disable

  - name: Infinity
    type: yesoreyeram-infinity-datasource
    access: proxy
    jsonData:
      allowedHosts:
        - localhost

  - name: Google Sheets
    type: grafana-googlesheets-datasource
    access: proxy
    basicAuth: false
    isDefault: false
    jsonData:
      authenticationType: jwt
      clientEmail: REPLACE_WITH_GCP_CLIENT_EMAIL
      defaultProject: REPLACE_WITH_GCP_PROJECT
      pdcInjected: false
      tokenUri: https://oauth2.googleapis.com/token
    secureJsonData:
      privateKey: REPLACE_WITH_GCP_SERVICE_ACCOUNT_TOKEN
