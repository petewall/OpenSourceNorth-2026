<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grafana Demo Deck</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="deck-header">
        <div>
          <p class="eyebrow">Open Source North 2026</p>
          <h1 id="slide-title"></h1>
          <p id="slide-subtitle" class="subtitle"></p>
        </div>
        <div class="status">
          <span id="progress"></span>
          <button id="fullscreen-btn" aria-label="Toggle fullscreen">⤢</button>
        </div>
      </header>
      <main id="slide-content" class="slide"></main>
      <footer class="deck-footer">
        <div class="notes" id="slide-notes"></div>
        <div class="controls">
          <button id="prev-btn" aria-label="Previous slide">← Prev</button>
          <button id="next-btn" aria-label="Next slide">Next →</button>
        </div>
      </footer>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
